[settings]
experimental = true
plugin_autoupdate_last_check_duration = "7d"
always_keep_download = false
always_keep_install = false

[tools]
# グローバルで常に利用可能にするツール
#
# 注意: install_* スクリプトも `mise use --global` を呼ぶが、
# install_dev_tools 末尾の `chezmoi apply` がこのファイルで global 設定を
# 上書きするため、グローバルに残すツールはここで明示的に列挙する必要がある。
# このファイルに無いツールは chezmoi apply 後に config から消える。
node = "lts"
# pnpm は 10.33.2 に pin。aqua-registry の段階制約で 10.33.3 が誤って
# tar.gz (v11+) 枝に落ちるため。詳細は scripts/lib/install-languages.sh 参照。
pnpm = "10.33.2"
python = "latest"
uv = "latest"
gitleaks = "latest"
ast-grep = "latest"
yq = "latest"
chezmoi = "latest"
just = "latest"
zoxide = "latest"
shellcheck = "latest"
