[tools]
# Runtime & package managers (commitlint に必要)
node = "24"
# pnpm は 10.33.2 に pin（aqua-registry 段階制約の影響回避）。
# 詳細: scripts/lib/install-languages.sh
pnpm = "10.33.2"

# Linters & formatters
biome = "latest"
taplo = "latest"
shellcheck = "0.11"
shfmt = "3"
bats = "1"
chezmoi = "2"
"npm:markdownlint-cli2" = "0.21"
"pipx:yamllint" = "1"
yamlfmt = "0.21"
actionlint = "1"
gitleaks = "8"
"pipx:mdformat" = "0.7"

# Git hooks & commit conventions
lefthook = "2"
"npm:@commitlint/cli" = "20"
"npm:@commitlint/config-conventional" = "20"
